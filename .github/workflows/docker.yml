name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'         # release tags (also publishes to PyPI via release.yml)
      - 'docker-v*'  # docker-only publish, no PyPI re-release
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. 0.8.2). Defaults to 'latest' only."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  # Multi-arch so M-series Macs, ARM servers, and amd64 all get a native image.
  PLATFORMS: linux/amd64,linux/arm64
  DOCKERHUB_NAMESPACE: thirstyoftp

jobs:
  build-and-push:
    name: Build and push (GHCR + Docker Hub)
    runs-on: ubuntu-latest
    # `secrets` is not available in step `if:`; map to env so the Docker Hub
    # leg is skipped cleanly when the secrets are not configured.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub leg requires repo secrets DOCKERHUB_USERNAME / DOCKERHUB_TOKEN.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute image references and tags
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          GHCR="ghcr.io/${OWNER}/thirsty-lang"
          HUB="docker.io/${DOCKERHUB_NAMESPACE}/thirsty-lang"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            REF="${GITHUB_REF#refs/tags/}"   # v0.8.2 | docker-v0.8.2
            REF="${REF#docker-}"             # v0.8.2
            VERSION="${REF#v}"               # 0.8.2
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          TAGS="${GHCR}:latest"
          if [ -n "${DOCKERHUB_TOKEN}" ]; then
            TAGS="${TAGS},${HUB}:latest"
          fi
          if [ -n "$VERSION" ]; then
            TAGS="${TAGS},${GHCR}:${VERSION}"
            if [ -n "${DOCKERHUB_TOKEN}" ]; then
              TAGS="${TAGS},${HUB}:${VERSION}"
            fi
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "ghcr=${GHCR}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building: ${TAGS}"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image (pull and run)
        run: |
          docker pull ${{ steps.meta.outputs.ghcr }}:latest
          docker run --rm ${{ steps.meta.outputs.ghcr }}:latest --version
          docker run --rm ${{ steps.meta.outputs.ghcr }}:latest run --demo

      - name: Release summary
        run: |
          {
            echo "## Docker image published"
            echo ""
            echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`"
            echo ""
            echo "**Pull (GHCR):**"
            echo "\`\`\`bash"
            echo "docker pull ${{ steps.meta.outputs.ghcr }}:latest"
            echo "\`\`\`"
            echo "**Pull (Docker Hub):**"
            echo "\`\`\`bash"
            echo "docker pull ${DOCKERHUB_NAMESPACE}/thirsty-lang:latest"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
