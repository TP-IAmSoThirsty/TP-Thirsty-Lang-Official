# Pre-commit hooks for Thirsty-Lang
# Installation: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Trailing whitespace and end-of-file fixer
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Black code formatter
  - repo: https://github.com/psf/black
    rev: 23.7.0
    hooks:
      - id: black
        language_version: python3.11

  # Ruff linter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]

  # YAML formatter
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.0-alpha.9-for-vscode
    hooks:
      - id: prettier
        types_or: [yaml]
        additional_dependencies: ['prettier@3.0.0-alpha.9']

  # Custom hooks (optional — requires Python scripts in scripts/ dir)
  # Validate pyproject.toml and entry points manually with:
  #   python -m py_compile pyproject.toml
  #   grep "thirsty.*:main" pyproject.toml  # verify all 6 scripts
